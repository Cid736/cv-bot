services:
  - type: web
    name: cv-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: PORT
        value: 10000       # Render assigns this automatically
